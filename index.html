<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH 위젯 에디터</title>
<style>
  :root{
    --bg:#0d0e12; --panel:#14161d; --panel2:#0f1116; --line:#262a33;
    --txt:#e6e8ee; --txt2:#9aa0ad; --txt3:#6a6f7b; --acc:#6f8aa3;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;font-size:13px;-webkit-text-size-adjust:100%;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);background:var(--panel2);position:sticky;top:0;z-index:20;}
  .topbar h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px;}
  .topbar .sub{font-size:10.5px;color:var(--txt3);margin-top:2px;}
  .topbtns{display:flex;gap:7px;flex-wrap:wrap;}
  button{font-family:inherit;font-size:12px;cursor:pointer;border:1px solid var(--line);background:#1b1e26;color:var(--txt);border-radius:8px;padding:7px 12px;transition:.12s;}
  button:hover{background:#232733;border-color:#374050;}
  button:disabled{opacity:.3;cursor:default;}
  button.primary{background:var(--acc);border-color:var(--acc);color:#0b1116;font-weight:600;}
  button.primary:hover{filter:brightness(1.1);}
  button.danger{color:#d88;border-color:#3a2326;}
  button.danger:hover{background:#2a1518;}
  button.tiny{padding:3px 9px;font-size:11px;border-radius:6px;}

  /* mobile tab switcher */
  .tabs{display:none;gap:8px;padding:10px 16px 0;}
  .tabs button{flex:1;padding:9px;font-size:13px;}
  .tabs button.on{background:var(--acc);color:#0b1116;border-color:var(--acc);font-weight:600;}

  .wrap{display:grid;grid-template-columns:minmax(340px,1fr) 430px;align-items:start;}
  .editor-col{padding:14px 16px 90px;overflow-y:auto;}
  .preview-col{position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:20px 16px;border-left:1px solid var(--line);background:#0a0a0c;}

  /* theme picker */
  .themebar{display:flex;gap:9px;margin-bottom:14px;}
  .themebar button{flex:1;padding:11px;font-size:13px;font-weight:600;}
  .themebar button.on{background:var(--acc);color:#0b1116;border-color:var(--acc);}

  details.sec{border:1px solid var(--line);border-radius:10px;margin-bottom:11px;background:var(--panel);overflow:hidden;}
  details.sec>summary{padding:11px 14px;cursor:pointer;font-weight:600;font-size:13px;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none;}
  details.sec>summary::-webkit-details-marker{display:none;}
  details.sec>summary .chev{color:var(--txt3);font-size:11px;transition:.15s;}
  details.sec[open]>summary .chev{transform:rotate(180deg);}
  details.sec[open]>summary{border-bottom:1px solid var(--line);}
  .sec-body{padding:13px 14px;}

  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:11px;color:var(--txt2);margin-bottom:5px;letter-spacing:.2px;}
  .field input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 9px;font-size:13px;font-family:inherit;}
  .field input[type=text]:focus{outline:none;border-color:var(--acc);}
  .colorrow{display:flex;align-items:center;gap:9px;}
  .colorrow input[type=color]{width:38px;height:34px;padding:0;border:1px solid var(--line);border-radius:7px;background:none;cursor:pointer;flex-shrink:0;}
  .colorrow input[type=text]{flex:1;font-family:monospace;}
  .emoji-in{text-align:center;font-size:16px;}

  .bubble-card{border:1px solid var(--line);border-radius:9px;padding:11px;margin-bottom:10px;background:var(--panel2);}
  .bc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .bc-title{font-size:12px;font-weight:600;color:var(--acc);}
  .bc-btns{display:flex;gap:5px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .side-toggle{display:flex;gap:6px;}
  .side-toggle button{flex:1;padding:7px;font-size:11px;}
  .side-toggle button.on{background:var(--acc);color:#0b1116;border-color:var(--acc);font-weight:600;}

  .hint{font-size:10.5px;color:var(--txt3);line-height:1.6;margin-top:8px;padding:8px 10px;background:#101319;border:1px solid #1d2129;border-radius:7px;}
  .hint b{color:#c8a86b;}
  .addbtn{width:100%;border-style:dashed;padding:10px;color:var(--txt2);}

  .preview-label{font-size:10.5px;color:var(--txt3);margin-bottom:12px;letter-spacing:.3px;text-transform:uppercase;}
  textarea.codeout{width:100%;min-height:140px;background:var(--panel2);border:1px solid var(--line);color:#9aa0ad;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;line-height:1.5;resize:vertical;}
  .row-flex{display:flex;gap:9px;}
  .row-flex .field{flex:1;}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1d9e75;color:#fff;padding:11px 22px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 4px 16px #0008;}
  .toast.show{opacity:1;}

  @media(max-width:820px){
    .tabs{display:flex;}
    .wrap{grid-template-columns:1fr;}
    .editor-col{padding-bottom:40px;}
    .preview-col{position:static;height:auto;border-left:none;border-top:1px solid var(--line);}
    .wrap.show-edit .preview-col{display:none;}
    .wrap.show-prev .editor-col{display:none;}
    .topbar h1{font-size:14px;}
    .topbar .sub{display:none;}
    .grid2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>🛡️ ARCH 위젯 에디터</h1>
    <div class="sub">테마 선택 후 세부 조정 · 상태값({{ }})은 유지 · 케이브덕 붙여넣기용 코드 출력</div>
  </div>
  <div class="topbtns">
    <button onclick="saveJSON()">💾 저장</button>
    <button onclick="document.getElementById('loadfile').click()">📂 불러오기</button>
    <input type="file" id="loadfile" accept=".json" style="display:none" onchange="loadJSON(event)">
    <button class="primary" onclick="copyCode()">📋 코드 복사</button>
  </div>
</div>

<div class="tabs">
  <button id="tab-edit" class="on" onclick="setTab('edit')">✏️ 편집</button>
  <button id="tab-prev" onclick="setTab('prev')">👁️ 미리보기</button>
</div>

<div class="wrap show-edit" id="wrap">
  <div class="editor-col" id="editor"></div>
  <div class="preview-col">
    <div class="preview-label">미리보기 — {{상태값}}은 실제 대화에서 치환됩니다</div>
    <div id="preview"></div>
    <details class="sec" style="margin-top:16px;">
      <summary>📋 출력 코드 <span class="chev">▼</span></summary>
      <div class="sec-body">
        <textarea class="codeout" id="codeout" readonly></textarea>
        <button class="primary" style="width:100%;margin-top:9px;" onclick="copyCode()">📋 이 코드 복사</button>
      </div>
    </details>
  </div>
</div>

<div class="toast" id="toast">복사됨!</div>

<script>
/* ============ 테마 프리셋 ============ */
const THEMES = {
  dark:{
    bg:"#0a0a0c", border:"#26262b", line:"#1c1c20", sbBg:"#0c0c0e",
    txtMain:"#f0f0f2", txtSub:"#84848a", txtLabel:"#6a6a70", txtVal:"#cfcfd4",
    gaugeTrack:"#18181c", heart:"#a86b73",
    e1:"#a8595a", e2:"#8f7f93", e3:"#6f8a82",
    headAvBg:"#221319",
    charAvBg:"#221319", charBg:"#1d1d22", charTxt:"#e2e2e6", charLabel:"#84848a",
    userAvBg:"#12202b", userBg:"#152230", userTxt:"#ccdae6", userLabel:"#84848a",
    sysTxt:"#84848a", sysBg:"#101013", sysBorder:"#202025",
    aiBg:"#0e0e11", footer:"#26262b"
  },
  light:{
    bg:"#f4f4f2", border:"#d9d9d3", line:"#e2e2dc", sbBg:"#ebebe6",
    txtMain:"#1c1c1a", txtSub:"#7a7a72", txtLabel:"#9a9a90", txtVal:"#3a3a36",
    gaugeTrack:"#e2e2dc", heart:"#b85a68",
    e1:"#c86a5a", e2:"#9a8aa0", e3:"#6f9a82",
    headAvBg:"#ece4e0",
    charAvBg:"#ece4e0", charBg:"#eceae4", charTxt:"#2a2a26", charLabel:"#9a9a90",
    userAvBg:"#dde8f0", userBg:"#dde8f0", userTxt:"#1f3a4a", userLabel:"#9a9a90",
    sysTxt:"#8a8a82", sysBg:"#e8e8e2", sysBorder:"#d2d2cc",
    aiBg:"#ebebe6", footer:"#d2d2cc"
  }
};

/* ============ 기본 상태 ============ */
function freshState(themeKey){
  const t=THEMES[themeKey];
  return {
    theme:themeKey,
    colors:JSON.parse(JSON.stringify(t)),
    statusbar:{ right:"ARCH · ▮▮▮▯" },
    header:{ avatar:"🔥", name:"CODENAME", sub:"SENTINEL · 뱅가드 S · 🔥 PYRE" },
    bubbles:[
      { speaker:"CHAR", emoji:"🔥", side:"left",  varName:"마음1" },
      { speaker:"USER", emoji:"💧", side:"right", varName:"마음2" },
      { speaker:"CHAR", emoji:"🔥", side:"left",  varName:"마음3" }
    ]
  };
}
let S = freshState("dark");

/* ============ 테마 적용 (개별 색 초기화) ============ */
function applyTheme(key){
  S.theme=key;
  S.colors=JSON.parse(JSON.stringify(THEMES[key]));
  renderEditor(); sync();
}

/* ============ 입력 위젯 ============ */
function escAttr(s){return (s||"").replace(/"/g,"&quot;");}
function escHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function colorField(label, key){
  const id="c"+Math.random().toString(36).slice(2,8);
  const val=S.colors[key];
  setTimeout(()=>{
    const root=document.getElementById(id); if(!root)return;
    const ci=root.querySelector("input[type=color]"), ti=root.querySelector("input[type=text]");
    ci.oninput=()=>{ti.value=ci.value;S.colors[key]=ci.value;sync();};
    ti.oninput=()=>{ let v=ti.value.trim(); if(!v.startsWith("#"))v="#"+v; if(/^#[0-9a-fA-F]{6}$/.test(v)){ci.value=v;S.colors[key]=v;sync();}};
  },0);
  return `<div class="field" id="${id}"><label>${label}</label>
    <div class="colorrow"><input type="color" value="${val}"><input type="text" value="${val}"></div></div>`;
}
function textField(label, obj, prop, ph=""){
  const id="t"+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.oninput=()=>{obj[prop]=el.value;sync();};},0);
  return `<div class="field"><label>${label}</label><input type="text" id="${id}" value="${escAttr(obj[prop])}" placeholder="${ph}"></div>`;
}
function emojiField(label, obj, prop){
  const id="e"+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.oninput=()=>{obj[prop]=el.value;sync();};},0);
  return `<div class="field"><label>${label}</label><input class="emoji-in" type="text" id="${id}" value="${escAttr(obj[prop])}" maxlength="8"></div>`;
}

/* ============ 에디터 렌더 ============ */
function sec(title, body, open){
  return `<details class="sec" ${open?"open":""}><summary>${title} <span class="chev">▼</span></summary><div class="sec-body">${body}</div></details>`;
}
function renderEditor(){
  const e=document.getElementById("editor");
  let html="";

  html += `<div class="themebar">
    <button class="${S.theme==='dark'?'on':''}" onclick="applyTheme('dark')">🌙 다크</button>
    <button class="${S.theme==='light'?'on':''}" onclick="applyTheme('light')">☀️ 라이트</button>
  </div>`;

  html += sec("👤 헤더 (프로필)",
    emojiField("아바타 이모지", S.header, "avatar") +
    textField("코드네임 (굵은 글씨)", S.header, "name", "예: CODENAME") +
    textField("서브라인 (역할/직급)", S.header, "sub", "예: SENTINEL · 뱅가드 S · 🔥 PYRE") +
    textField("상단바 우측 텍스트", S.statusbar, "right")
  , true);

  let bub = S.bubbles.map((b,i)=>bubbleCard(b,i)).join("");
  bub += `<button class="addbtn" onclick="addBubble()">＋ 말풍선 추가</button>`;
  bub += `<div class="hint">⚠️ 말풍선을 추가하면 본문 변수가 <b>{{마음N}}</b>으로 자동 부여됩니다. 케이브덕 <b>상태값</b>에도 같은 이름(예: <b>마음4</b>)을 똑같이 추가해야 채워집니다.</div>`;
  html += sec("💬 말풍선", bub, true);

  html += sec("🎨 색상 세부 조정",
    `<div class="hint" style="margin-top:0;margin-bottom:12px;">테마를 다시 누르면 아래 조정값은 테마 기본색으로 <b>초기화</b>됩니다.</div>` +
    `<div style="font-size:11px;color:var(--txt2);font-weight:600;margin:4px 0 9px;">전역</div>` +
    colorField("위젯 배경", "bg") + colorField("테두리", "border") + colorField("구분선", "line") +
    colorField("상단바 배경", "sbBg") +
    `<div style="font-size:11px;color:var(--txt2);font-weight:600;margin:14px 0 9px;">텍스트</div>` +
    colorField("메인 글씨", "txtMain") + colorField("보조 글씨", "txtSub") +
    colorField("라벨 글씨", "txtLabel") + colorField("값 글씨", "txtVal") +
    `<div style="font-size:11px;color:var(--txt2);font-weight:600;margin:14px 0 9px;">게이지 · 감정 · 하트</div>` +
    colorField("게이지 트랙(빈칸)", "gaugeTrack") + colorField("하트", "heart") +
    colorField("감정1 막대", "e1") + colorField("감정2 막대", "e2") + colorField("감정3 막대", "e3") +
    `<div class="hint">게이지 색(가이딩/정신력)은 상태값 <b>{{색}}·{{정신색}}</b>으로 대화에서 자동 결정됩니다.</div>` +
    `<div style="font-size:11px;color:var(--txt2);font-weight:600;margin:14px 0 9px;">말풍선 · 캐릭터(왼쪽)</div>` +
    colorField("아바타 배경", "charAvBg") + colorField("말풍선 배경", "charBg") +
    colorField("글자색", "charTxt") + colorField("라벨색", "charLabel") +
    `<div style="font-size:11px;color:var(--txt2);font-weight:600;margin:14px 0 9px;">말풍선 · 유저(오른쪽)</div>` +
    colorField("아바타 배경", "userAvBg") + colorField("말풍선 배경", "userBg") +
    colorField("글자색", "userTxt") + colorField("라벨색", "userLabel")
  );

  e.innerHTML=html;
}

function bubbleCard(b,i){
  const id="bub"+i+"_"+Math.random().toString(36).slice(2,5);
  setTimeout(()=>{
    const root=document.getElementById(id); if(!root)return;
    root.querySelector(".side-l").onclick=()=>{S.bubbles[i].side="left";renderEditor();sync();};
    root.querySelector(".side-r").onclick=()=>{S.bubbles[i].side="right";renderEditor();sync();};
  },0);
  return `<div class="bubble-card" id="${id}">
    <div class="bc-head">
      <span class="bc-title">말풍선 ${i+1} · {{${b.varName}}}</span>
      <span class="bc-btns">
        <button class="tiny" onclick="moveBubble(${i},-1)" ${i===0?"disabled":""}>↑</button>
        <button class="tiny" onclick="moveBubble(${i},1)" ${i===S.bubbles.length-1?"disabled":""}>↓</button>
        <button class="tiny danger" onclick="removeBubble(${i})">삭제</button>
      </span>
    </div>
    <div class="grid2">
      ${textField("화자 라벨", b, "speaker")}
      ${emojiField("이모지", b, "emoji")}
    </div>
    <div class="field"><label>정렬 (색은 좌=캐릭터 / 우=유저 테마색 적용)</label>
      <div class="side-toggle">
        <button class="side-l ${b.side==='left'?'on':''}">◀ 왼쪽 (캐릭터)</button>
        <button class="side-r ${b.side==='right'?'on':''}">오른쪽 (유저) ▶</button>
      </div>
    </div>
  </div>`;
}

/* ============ 말풍선 조작 ============ */
function renumber(){ S.bubbles.forEach((b,i)=>b.varName="마음"+(i+1)); }
function addBubble(){
  S.bubbles.push({speaker:"CHAR",emoji:"🔥",side:"left",varName:"마음"+(S.bubbles.length+1)});
  renumber(); renderEditor(); sync();
}
function removeBubble(i){
  if(S.bubbles.length<=1){toast("최소 1개는 필요해요");return;}
  S.bubbles.splice(i,1); renumber(); renderEditor(); sync();
}
function moveBubble(i,d){
  const j=i+d; if(j<0||j>=S.bubbles.length)return;
  [S.bubbles[i],S.bubbles[j]]=[S.bubbles[j],S.bubbles[i]];
  renumber(); renderEditor(); sync();
}

/* ============ 코드 생성 ============ */
function bubbleHTML(b){
  const c=S.colors;
  const isU = b.side==="right";
  const avBg = isU?c.userAvBg:c.charAvBg;
  const bg   = isU?c.userBg:c.charBg;
  const txt  = isU?c.userTxt:c.charTxt;
  const lbl  = isU?c.userLabel:c.charLabel;
  const flip = isU?"flex-direction:row-reverse;":"";
  const align= isU?"text-align:right;":"";
  const radius=isU?"14px 3px 14px 14px":"3px 14px 14px 14px";
  return `  <div style="display:flex;gap:9px;align-items:flex-start;${flip}margin-bottom:13px;">
    <div style="width:30px;height:30px;border-radius:50%;background:${avBg};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${b.emoji}</div>
    <div style="max-width:80%;">
      <div style="font-family:monospace;font-size:7px;color:${lbl};margin-bottom:4px;letter-spacing:.4px;${align}">${escHtml(b.speaker)}</div>
      <div style="background:${bg};border-radius:${radius};padding:9px 12px;font-size:9px;line-height:1.55;color:${txt};${align}">{{${b.varName}}}</div>
    </div>
  </div>`;
}
function buildCode(){
  const c=S.colors, h=S.header, sb=S.statusbar;
  const bubbles=S.bubbles.map(bubbleHTML).join("\n");
  return `<div style="width:100%;margin:0 auto;background:${c.bg};border:1px solid ${c.border};border-radius:14px;overflow:hidden;color:${c.txtMain};font-family:sans-serif;">
  <div style="position:relative;display:flex;justify-content:space-between;align-items:center;padding:9px 18px;font-family:monospace;font-size:9px;letter-spacing:.5px;background:${c.sbBg};">
    <span style="font-weight:500;color:${c.txtMain};">{{시간}}</span>
    <span style="position:absolute;left:50%;transform:translateX(-50%);width:56px;height:15px;border-radius:99px;background:${c.bg};border:1px solid ${c.line};"></span>
    <span style="color:${c.txtSub};">${escHtml(sb.right)}</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid ${c.line};">
    <div style="width:34px;height:34px;border-radius:50%;background:${c.headAvBg};display:flex;align-items:center;justify-content:center;font-size:14px;">${h.avatar}</div>
    <div style="flex:1;line-height:1.35;">
      <div style="font-size:13px;font-weight:500;letter-spacing:.4px;color:${c.txtMain};">${escHtml(h.name)}</div>
      <div style="font-family:monospace;font-size:7.5px;color:${c.txtSub};letter-spacing:.4px;">${escHtml(h.sub)}</div>
    </div>
    <div style="font-family:monospace;font-size:7px;color:${c.txtSub};letter-spacing:.4px;border:1px solid ${c.border};border-radius:99px;padding:3px 10px;">{{관계}}</div>
  </div>
  <div style="padding:11px 15px;border-bottom:1px solid ${c.line};font-size:9px;line-height:1.5;">
    <div style="display:flex;padding:3px 0;"><span style="font-family:monospace;font-size:7.5px;color:${c.txtLabel};width:54px;letter-spacing:.4px;flex-shrink:0;">DATE</span><span style="color:${c.txtVal};">{{날짜}} [ D + {{디데이}} ]</span></div>

/* ============ 동기화 / 탭 / 저장 ============ */
function sync(){
  const code=buildCode();
  document.getElementById("preview").innerHTML=code;
  document.getElementById("codeout").value=code;
}
function setTab(t){
  const w=document.getElementById("wrap");
  w.className="wrap "+(t==="edit"?"show-edit":"show-prev");
  document.getElementById("tab-edit").classList.toggle("on",t==="edit");
  document.getElementById("tab-prev").classList.toggle("on",t==="prev");
  window.scrollTo(0,0);
}
function saveJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(S.header.name||"arch-widget")+"_위젯설정.json";
  a.click(); toast("설정 저장됨!");
}
function loadJSON(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      const base=freshState(obj.theme&&THEMES[obj.theme]?obj.theme:"dark");
      S=Object.assign(base,obj);
      S.colors=Object.assign(JSON.parse(JSON.stringify(THEMES[S.theme])),obj.colors||{});
      if(!Array.isArray(S.bubbles)||!S.bubbles.length)S.bubbles=base.bubbles;
      renumber(); renderEditor(); sync(); toast("불러오기 완료!");
    }catch(e){toast("파일을 읽을 수 없어요");}
  };
  r.readAsText(f); ev.target.value="";
}
function copyCode(){
  const code=buildCode();
  navigator.clipboard.writeText(code).then(
    ()=>toast("코드 복사됨! 케이브덕에 붙여넣으세요"),
    ()=>{const ta=document.getElementById("codeout");ta.select();document.execCommand("copy");toast("코드 복사됨!");}
  );
}
let toastT;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800);
}

renderEditor(); sync();
</script>
