<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCH 위젯 에디터</title>
<style>
  :root{
    --bg:#0d0e12; --panel:#14161d; --panel2:#0f1116; --line:#262a33;
    --txt:#e6e8ee; --txt2:#9aa0ad; --txt3:#6a6f7b; --acc:#6f8aa3;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;font-size:13px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel2);position:sticky;top:0;z-index:10;}
  .topbar h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px;}
  .topbar .sub{font-size:11px;color:var(--txt3);}
  .topbtns{display:flex;gap:8px;flex-wrap:wrap;}
  button{font-family:inherit;font-size:12px;cursor:pointer;border:1px solid var(--line);background:#1b1e26;color:var(--txt);border-radius:8px;padding:7px 13px;transition:.12s;}
  button:hover{background:#232733;border-color:#374050;}
  button.primary{background:var(--acc);border-color:var(--acc);color:#0b1116;font-weight:600;}
  button.primary:hover{filter:brightness(1.1);}
  button.danger{color:#d88;border-color:#3a2326;}
  button.danger:hover{background:#2a1518;}
  button.tiny{padding:3px 8px;font-size:11px;border-radius:6px;}
  .wrap{display:grid;grid-template-columns:minmax(360px,1fr) 440px;gap:0;align-items:start;}
  @media(max-width:880px){.wrap{grid-template-columns:1fr;}.preview-col{position:static !important;}}
  .editor-col{padding:16px 18px 80px;overflow-y:auto;}
  .preview-col{position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;padding:20px 18px;border-left:1px solid var(--line);background:#0a0a0c;}
  details.sec{border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--panel);overflow:hidden;}
  details.sec>summary{padding:11px 14px;cursor:pointer;font-weight:600;font-size:13px;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none;}
  details.sec>summary::-webkit-details-marker{display:none;}
  details.sec>summary .chev{color:var(--txt3);font-size:11px;}
  details.sec[open]>summary{border-bottom:1px solid var(--line);}
  .sec-body{padding:13px 14px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:11px;color:var(--txt2);margin-bottom:5px;letter-spacing:.2px;}
  .field input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 9px;font-size:12px;font-family:inherit;}
  .field input[type=text]:focus{outline:none;border-color:var(--acc);}
  .colorrow{display:flex;align-items:center;gap:9px;}
  .colorrow input[type=color]{width:34px;height:30px;padding:0;border:1px solid var(--line);border-radius:6px;background:none;cursor:pointer;flex-shrink:0;}
  .colorrow input[type=text]{flex:1;font-family:monospace;}
  .swatches{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .swatches .sw{width:19px;height:19px;border-radius:5px;border:1px solid #00000055;cursor:pointer;position:relative;}
  .swatches .sw:hover{outline:2px solid #ffffff66;}
  .bubble-card{border:1px solid var(--line);border-radius:9px;padding:11px;margin-bottom:10px;background:var(--panel2);}
  .bubble-card .bc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .bubble-card .bc-head .bc-title{font-size:12px;font-weight:600;color:var(--acc);}
  .bubble-card .bc-head .bc-btns{display:flex;gap:5px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .side-toggle{display:flex;gap:6px;}
  .side-toggle button{flex:1;padding:6px;font-size:11px;}
  .side-toggle button.on{background:var(--acc);color:#0b1116;border-color:var(--acc);font-weight:600;}
  .hint{font-size:10.5px;color:var(--txt3);line-height:1.6;margin-top:7px;padding:8px 10px;background:#101319;border:1px solid #1d2129;border-radius:7px;}
  .hint b{color:#c8a86b;}
  .addbtn{width:100%;border-style:dashed;padding:9px;color:var(--txt2);}
  .preview-label{font-size:11px;color:var(--txt3);margin-bottom:10px;letter-spacing:.3px;text-transform:uppercase;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d9e75;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
  textarea.codeout{width:100%;min-height:150px;background:var(--panel2);border:1px solid var(--line);color:#9aa0ad;border-radius:8px;padding:10px;font-family:monospace;font-size:11px;line-height:1.5;resize:vertical;}
  .row-flex{display:flex;gap:9px;align-items:flex-end;}
  .row-flex .field{flex:1;margin-bottom:0;}
  .emoji-in{width:100%;text-align:center;font-size:15px;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>🛡️ ARCH 위젯 에디터</h1>
    <div class="sub">디자인만 편집 · 상태값({{ }})은 그대로 유지 · 케이브덕 붙여넣기용 코드 출력</div>
  </div>
  <div class="topbtns">
    <button onclick="saveJSON()">💾 설정 저장</button>
    <button onclick="document.getElementById('loadfile').click()">📂 불러오기</button>
    <input type="file" id="loadfile" accept=".json" style="display:none" onchange="loadJSON(event)">
    <button class="primary" onclick="copyCode()">📋 코드 복사</button>
  </div>
</div>

<div class="wrap">
  <!-- ============ EDITOR ============ -->
  <div class="editor-col" id="editor"></div>

  <!-- ============ PREVIEW ============ -->
  <div class="preview-col">
    <div class="preview-label">미리보기 — {{상태값}}은 실제 대화에서 치환됩니다</div>
    <div id="preview"></div>
    <details class="sec" style="margin-top:16px;">
      <summary>📋 출력 코드 (케이브덕 위젯 콘텐츠) <span class="chev">▼</span></summary>
      <div class="sec-body">
        <textarea class="codeout" id="codeout" readonly></textarea>
        <button class="primary" style="width:100%;margin-top:9px;" onclick="copyCode()">📋 이 코드 복사</button>
      </div>
    </details>
  </div>
</div>

<div class="toast" id="toast">복사됨!</div>

<script>
/* ====================== 위젯 컬러 팔레트 (프리셋 스와치) ====================== */
const PALETTE = [
  "#0a0a0c","#0c0c0e","#0e0e11","#101013","#14161d","#1a1a1a","#1d1d22",
  "#221319","#301515","#26262b","#1c1c20","#18181c","#161619",
  "#a8595a","#b05c5a","#8f7f93","#6f8a82","#a86b73","#b09a5e","#6f8aa3","#6f9a72",
  "#e2e2e6","#e6cccc","#ccdae6","#cfcfd4","#9aa0ad","#84848a","#6a6a70","#f0f0f2"
];

/* ====================== 기본 상태 (시작값) ====================== */
const DEFAULT = {
  global:{ bg:"#0a0a0c", border:"#26262b", line:"#1c1c20" },
  statusbar:{ right:"ARCH · ▮▮▮▯", bg:"#0c0c0e" },
  header:{ avatar:"🔥", avatarBg:"#221319", name:"CODENAME", sub:"SENTINEL · 뱅가드 S · 🔥 PYRE" },
  emotionColors:{ e1:"#a8595a", e2:"#8f7f93", e3:"#6f8a82" },
  bubbles:[
    { speaker:"CHAR", emoji:"🔥", side:"left",  avatarBg:"#221319", bg:"#1d1d22", color:"#e2e2e6", labelColor:"#84848a", varName:"마음1" },
    { speaker:"USER", emoji:"💧", side:"right", avatarBg:"#12202b", bg:"#152230", color:"#ccdae6", labelColor:"#84848a", varName:"마음2" },
    { speaker:"CHAR", emoji:"🔥", side:"left",  avatarBg:"#221319", bg:"#1d1d22", color:"#e2e2e6", labelColor:"#84848a", varName:"마음3" }
  ]
};

let S = JSON.parse(JSON.stringify(DEFAULT));

/* ====================== 컬러 입력 위젯 빌더 ====================== */
function colorField(label, value, onchange){
  const id = "c"+Math.random().toString(36).slice(2,8);
  const sw = PALETTE.map(c=>`<span class="sw" style="background:${c}" title="${c}" data-c="${c}"></span>`).join("");
  setTimeout(()=>{
    const root=document.getElementById(id);
    if(!root)return;
    const ci=root.querySelector("input[type=color]"), ti=root.querySelector("input[type=text]");
    ci.oninput=()=>{ti.value=ci.value;onchange(ci.value);};
    ti.oninput=()=>{ if(/^#[0-9a-fA-F]{6}$/.test(ti.value)){ci.value=ti.value;onchange(ti.value);}};
    root.querySelectorAll(".sw").forEach(s=>s.onclick=()=>{const c=s.dataset.c;ci.value=c;ti.value=c;onchange(c);});
  },0);
  return `<div class="field" id="${id}">
    <label>${label}</label>
    <div class="colorrow">
      <input type="color" value="${value}">
      <input type="text" value="${value}">
    </div>
    <div class="swatches">${sw}</div>
  </div>`;
}
function textField(label, value, onchange, placeholder=""){
  const id="t"+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.oninput=()=>onchange(el.value);},0);
  return `<div class="field"><label>${label}</label><input type="text" id="${id}" value="${escAttr(value)}" placeholder="${placeholder}"></div>`;
}
function escAttr(s){return (s||"").replace(/"/g,"&quot;");}
function escHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ====================== 에디터 렌더 ====================== */
function renderEditor(){
  const e=document.getElementById("editor");
  e.innerHTML="";

  // 전역
  e.innerHTML += sec("🎨 전역 색상",
    colorField("위젯 배경", S.global.bg, v=>{S.global.bg=v;sync();}) +
    colorField("위젯 테두리", S.global.border, v=>{S.global.border=v;sync();}) +
    colorField("구분선", S.global.line, v=>{S.global.line=v;sync();}) +
    colorField("상단바 배경", S.statusbar.bg, v=>{S.statusbar.bg=v;sync();}) +
    textField("상단바 우측 텍스트", S.statusbar.right, v=>{S.statusbar.right=v;sync();})
  , true);

  // 헤더
  e.innerHTML += sec("👤 헤더 (프로필)",
    `<div class="row-flex">
      ${emojiField("아바타 이모지", S.header.avatar, v=>{S.header.avatar=v;sync();})}
     </div>` +
    colorField("아바타 배경색", S.header.avatarBg, v=>{S.header.avatarBg=v;sync();}) +
    textField("코드네임 (굵은 글씨)", S.header.name, v=>{S.header.name=v;sync();}, "예: CODE") +
    textField("서브라인 (역할/직급)", S.header.sub, v=>{S.header.sub=v;sync();}, "예: SENTINEL · 뱅가드 S · 🔥 PYRE")
  , true);

  // 감정바 색
  e.innerHTML += sec("📊 감정 막대 색상",
    colorField("감정1 막대", S.emotionColors.e1, v=>{S.emotionColors.e1=v;sync();}) +
    colorField("감정2 막대", S.emotionColors.e2, v=>{S.emotionColors.e2=v;sync();}) +
    colorField("감정3 막대", S.emotionColors.e3, v=>{S.emotionColors.e3=v;sync();}) +
    `<div class="hint">게이지(가이딩/정신력) 색은 <b>상태값 {{색}}·{{정신색}}</b>으로 대화에서 자동 결정되므로 여기서 편집하지 않습니다.</div>`
  );

  // 말풍선
  let bub = S.bubbles.map((b,i)=>bubbleCard(b,i)).join("");
  bub += `<button class="addbtn" onclick="addBubble()">＋ 말풍선 추가</button>`;
  bub += `<div class="hint">⚠️ 말풍선을 추가하면 본문 변수가 <b>{{마음N}}</b>으로 자동 부여됩니다. 케이브덕 <b>상태값</b>에도 동일한 이름(예: <b>마음4</b>)을 똑같이 추가해야 실제 대화에서 채워집니다.</div>`;
  e.innerHTML += sec("💬 말풍선", bub, true);
}

function emojiField(label,value,onchange){
  const id="e"+Math.random().toString(36).slice(2,8);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.oninput=()=>onchange(el.value);},0);
  return `<div class="field" style="flex:0 0 90px;"><label>${label}</label><input class="emoji-in" type="text" id="${id}" value="${escAttr(value)}" maxlength="8"></div>`;
}

function bubbleCard(b,i){
  const sideL = b.side==="left"?"on":"", sideR = b.side==="right"?"on":"";
  const id="bub"+i;
  setTimeout(()=>{
    const root=document.getElementById(id); if(!root)return;
    root.querySelector(".side-l").onclick=()=>{S.bubbles[i].side="left";renderEditor();sync();};
    root.querySelector(".side-r").onclick=()=>{S.bubbles[i].side="right";renderEditor();sync();};
  },0);
  return `<div class="bubble-card" id="${id}">
    <div class="bc-head">
      <span class="bc-title">말풍선 ${i+1} · 변수 {{${b.varName}}}</span>
      <span class="bc-btns">
        <button class="tiny" onclick="moveBubble(${i},-1)" ${i===0?"disabled style=opacity:.3":""}>↑</button>
        <button class="tiny" onclick="moveBubble(${i},1)" ${i===S.bubbles.length-1?"disabled style=opacity:.3":""}>↓</button>
        <button class="tiny danger" onclick="removeBubble(${i})">삭제</button>
      </span>
    </div>
    <div class="grid2">
      ${textField("화자 라벨", b.speaker, v=>{S.bubbles[i].speaker=v;sync();})}
      ${emojiField("이모지", b.emoji, v=>{S.bubbles[i].emoji=v;sync();})}
    </div>
    <div class="field"><label>정렬</label>
      <div class="side-toggle">
        <button class="side-l ${sideL}">◀ 왼쪽 (캐릭터)</button>
        <button class="side-r ${sideR}">오른쪽 (유저) ▶</button>
      </div>
    </div>
    <div class="grid2">
      ${colorField("말풍선 배경", b.bg, v=>{S.bubbles[i].bg=v;sync();})}
      ${colorField("글자색", b.color, v=>{S.bubbles[i].color=v;sync();})}
    </div>
    <div class="grid2">
      ${colorField("아바타 배경", b.avatarBg, v=>{S.bubbles[i].avatarBg=v;sync();})}
      ${colorField("라벨 글자색", b.labelColor, v=>{S.bubbles[i].labelColor=v;sync();})}
    </div>
  </div>`;
}

function sec(title, body, open){
  return `<details class="sec" ${open?"open":""}>
    <summary>${title} <span class="chev">▼</span></summary>
    <div class="sec-body">${body}</div>
  </details>`;
}

/* ====================== 말풍선 조작 ====================== */
function renumber(){ S.bubbles.forEach((b,i)=>b.varName="마음"+(i+1)); }
function addBubble(){
  S.bubbles.push({speaker:"CODE",emoji:"⚪",side:"left",avatarBg:"#1a1a1a",bg:"#1d1d22",color:"#e2e2e6",labelColor:"#84848a",varName:"마음"+(S.bubbles.length+1)});
  renumber(); renderEditor(); sync();
}
function removeBubble(i){
  if(S.bubbles.length<=1){toast("최소 1개는 필요해요");return;}
  S.bubbles.splice(i,1); renumber(); renderEditor(); sync();
}
function moveBubble(i,d){
  const j=i+d; if(j<0||j>=S.bubbles.length)return;
  [S.bubbles[i],S.bubbles[j]]=[S.bubbles[j],S.bubbles[i]];
  renumber(); renderEditor(); sync();
}

/* ====================== 코드 생성 ====================== */
function bubbleHTML(b){
  const flip = b.side==="right" ? "flex-direction:row-reverse;" : "";
  const align = b.side==="right" ? "text-align:right;" : "";
  const labelAlign = b.side==="right" ? "text-align:right;" : "";
  const radius = b.side==="right" ? "14px 3px 14px 14px" : "3px 14px 14px 14px";
  return `  <div style="display:flex;gap:9px;align-items:flex-start;${flip}margin-bottom:13px;">
    <div style="width:30px;height:30px;border-radius:50%;background:${b.avatarBg};display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">${b.emoji}</div>
    <div style="max-width:80%;">
      <div style="font-family:monospace;font-size:7px;color:${b.labelColor};margin-bottom:4px;letter-spacing:.4px;${labelAlign}">${escHtml(b.speaker)}</div>
      <div style="background:${b.bg};border-radius:${radius};padding:9px 12px;font-size:9px;line-height:1.55;color:${b.color};${align}">{{${b.varName}}}</div>
    </div>
  </div>`;
}

function buildCode(){
  const g=S.global, h=S.header, ec=S.emotionColors, sb=S.statusbar;
  const bubbles = S.bubbles.map(bubbleHTML).join("\n");
  return `<div style="width:100%;margin:0 auto;background:${g.bg};border:1px solid ${g.border};border-radius:14px;overflow:hidden;color:#f0f0f2;font-family:sans-serif;">
  <div style="position:relative;display:flex;justify-content:space-between;align-items:center;padding:9px 18px;font-family:monospace;font-size:9px;letter-spacing:.5px;background:${sb.bg};">
    <span style="font-weight:500;color:#f0f0f2;">{{시간}}</span>
    <span style="position:absolute;left:50%;transform:translateX(-50%);width:56px;height:15px;border-radius:99px;background:#000;border:1px solid ${g.line};"></span>
    <span style="color:#8a8a90;">${escHtml(sb.right)}</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid ${g.line};">
    <div style="width:34px;height:34px;border-radius:50%;background:${h.avatarBg};display:flex;align-items:center;justify-content:center;font-size:14px;">${h.avatar}</div>
    <div style="flex:1;line-height:1.35;">
      <div style="font-size:13px;font-weight:500;letter-spacing:.4px;">${escHtml(h.name)}</div>
      <div style="font-family:monospace;font-size:7.5px;color:#84848a;letter-spacing:.4px;">${escHtml(h.sub)}</div>
    </div>
    <div style="font-family:monospace;font-size:7px;color:#9a9aa0;letter-spacing:.4px;border:1px solid ${g.border};border-radius:99px;padding:3px 10px;">{{관계}}</div>
  </div>
  <div style="padding:11px 15px;border-bottom:1px solid ${g.line};font-size:9px;line-height:1.5;">
    <div style="display:flex;padding:3px 0;"><span style="font-family:monospace;font-size:7.5px;color:#6a6a70;width:54px;letter-spacing:.4px;flex-shrink:0;">DATE</span><span style="color:#cfcfd4;">{{날짜}} [ D + {{디데이}} ]</span></div>
    <div style="display:flex;padding:3px 0;"><span style="font-family:monospace;font-size:7.5px;color:#6a6a70;width:54px;letter-spacing:.4px;flex-shrink:0;">LOCATE</span><span style="color:#cfcfd4;">{{위치}}</span></div>
    <div style="display:flex;padding:3px 0;"><span style="font-family:monospace;font-size:7.5px;color:#6a6a70;width:54px;letter-spacing:.4px;flex-shrink:0;">SCENE</span><span style="color:#cfcfd4;">{{상황}}</span></div>
    <div style="display:flex;padding:3px 0;"><span style="font-family:monospace;font-size:7.5px;color:#6a6a70;width:54px;letter-spacing:.4px;flex-shrink:0;">NEXT</span><span style="color:#cfcfd4;">{{일정}}</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;"><span style="display:flex;"><span style="font-family:monospace;font-size:7.5px;color:#6a6a70;width:54px;letter-spacing:.4px;flex-shrink:0;">SYNK</span><span style="color:#8fa6bd;">{{싱크로}}</span></span></div>
  </div>
  <div style="padding:13px 15px;border-bottom:1px solid ${g.line};">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;">
      <span style="font-family:monospace;font-size:8px;color:#9a9aa0;letter-spacing:.6px;">GUIDING <span style="color:#5a5a60;font-size:7px;">/ 센티넬</span></span>
      <span style="font-family:monospace;font-size:8px;"><span style="color:{{색}};font-size:10px;font-weight:500;">{{가이딩}}%</span> <span style="color:#9a9aa0;">{{추세}}</span></span>
    </div>
    <div style="height:6px;background:#18181c;border-radius:99px;"><div style="height:100%;width:{{가이딩}}%;background:{{색}};border-radius:99px;"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin:12px 0 5px;">

/* ====================== 동기화 ====================== */
function sync(){
  const code = buildCode();
  document.getElementById("preview").innerHTML = code;
  document.getElementById("codeout").value = code;
}

/* ====================== 저장/불러오기/복사 ====================== */
function saveJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=(S.header.name||"arch-widget")+"_위젯설정.json";
  a.click();
  toast("설정 저장됨!");
}
function loadJSON(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      S=Object.assign(JSON.parse(JSON.stringify(DEFAULT)),obj);
      if(!Array.isArray(S.bubbles)||!S.bubbles.length)S.bubbles=JSON.parse(JSON.stringify(DEFAULT.bubbles));
      renumber(); renderEditor(); sync(); toast("불러오기 완료!");
    }catch(e){toast("파일을 읽을 수 없어요");}
  };
  r.readAsText(f);
  ev.target.value="";
}
function copyCode(){
  const code=buildCode();
  navigator.clipboard.writeText(code).then(()=>toast("코드 복사됨! 케이브덕에 붙여넣으세요"),()=>{
    const ta=document.getElementById("codeout"); ta.select(); document.execCommand("copy"); toast("코드 복사됨!");
  });
}
let toastT;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ====================== 시작 ====================== */
renderEditor();
sync();
</script>
